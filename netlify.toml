[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_ADMIN_PIN,VITE_ADMIN_SECRET,VITE_STRIPE_PUBLISHABLE_KEY,CLOUDINARY_CLOUD_NAME"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  autoLaunch = false

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
